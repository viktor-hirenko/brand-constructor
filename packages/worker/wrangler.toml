name = "brand-constructor-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
account_id = "71bd6a3d109ad42e0973488dafe041b2"

# Cloudflare D1 Database
[[d1_databases]]
binding = "DB"
database_name = "brand-constructor-db"
database_id = "2aafe66b-27be-4058-9c09-e784efefa404"

# Cloudflare R2 Bucket
[[r2_buckets]]
binding = "ASSETS_BUCKET"
bucket_name = "brand-constructor-assets"

# Development environment
[vars]
ENVIRONMENT = "development"
CORS_ORIGINS = "http://localhost:5173,http://localhost:5174"
CONSTRUCTOR_URL = "http://localhost:5174"
SLACK_CHANNEL_STRATEGY = "C0ANN1XJSTS"
SLACK_CHANNEL_PR = "C0AMCBX3DEK"
SLACK_CHANNEL_DESIGN = "C0AMTR5FLTC"
SLACK_CHANNEL_APPROVALS = "C0AMSELFLJJ"

# Production environment
[env.production]
vars = { ENVIRONMENT = "production", CORS_ORIGINS = "https://brand-constructor.pages.dev,https://brand-constructor-app.pages.dev", CONSTRUCTOR_URL = "https://brand-constructor-app.pages.dev", SLACK_CHANNEL_STRATEGY = "C0ANN1XJSTS", SLACK_CHANNEL_PR = "C0AMCBX3DEK", SLACK_CHANNEL_DESIGN = "C0AMTR5FLTC", SLACK_CHANNEL_APPROVALS = "C0AMSELFLJJ" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "brand-constructor-db"
database_id = "2aafe66b-27be-4058-9c09-e784efefa404"

[[env.production.r2_buckets]]
binding = "ASSETS_BUCKET"
bucket_name = "brand-constructor-assets"

